<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Yes or No</title>
  <meta name="description" content="Choose yes or no and see the result instantly.">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="app" id="app">
    <section class="choice-screen" id="choice-screen" aria-label="Choose yes or no">
      <button class="choice-button choice-button-yes" type="button" data-choice="yes" data-reveal aria-label="Choose yes">
        <span class="choice-label">YES</span>
      </button>
      <button class="choice-button choice-button-no" type="button" data-choice="no" data-reveal aria-label="Choose no">
        <span class="choice-label">NO</span>
      </button>
    </section>

    <section class="result-screen" id="result-screen" aria-live="polite" hidden>
      <div class="emoji-rain" id="emoji-rain" aria-hidden="true"></div>
      <button class="reset-button" id="reset-button" type="button" aria-label="Choose again">
        Back
      </button>
      <div class="result-word" id="result-word"></div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>
</body>

</html>
