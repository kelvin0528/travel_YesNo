<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>The Food Judge | 美食判官</title>
  <meta name="description" content="A cinematic, highly interactive judgment interface with responsive GSAP animations and particle effects.">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Simulated Phone Frame for Desktop, transparent on Mobile -->
  <div class="device-wrapper">
    <main class="app-container" id="app">
      
      <!-- Interactive HTML5 Canvas for particle explosions and neon flows -->
      <canvas id="particle-canvas" class="particle-canvas"></canvas>
      
      <!-- Fullscreen Cinematic Color Wash Background overlays -->
      <div class="color-wash color-wash-correct" id="wash-correct"></div>
      <div class="color-wash color-wash-wrong" id="wash-wrong"></div>
      
      <!-- Audio Toggle Button -->
      <button class="sound-toggle-btn" id="sound-toggle" aria-label="Toggle Sound" title="Toggle Sound">
        <svg class="sound-icon-on" viewBox="0 0 24 24" width="24" height="24">
          <path fill="currentColor" d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18,19.86 21,16.28 21,12C21,7.72 18,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z" />
        </svg>
        <svg class="sound-icon-off hidden" viewBox="0 0 24 24" width="24" height="24">
          <path fill="currentColor" d="M12,4L9.91,6.09L12,8.18M4.27,3L3,4.27L7.73,9H3V15H7L12,20V13.27L16.25,17.53C15.58,18.04 14.83,18.43 14,18.7V20.77C15.38,20.44 16.63,19.78 17.7,18.9L20.73,21.93L22,20.66L4.27,3M19,12C19,12.94 18.8,13.82 18.46,14.64L19.97,16.15C20.62,14.91 21,13.5 21,12C21,7.72 18,4.14 14,3.23V5.29C16.89,6.15 19,8.83 19,12M16.5,12C16.5,11.23 16.28,10.5 15.91,9.89L18.03,7.77C18.65,9 19,10.45 19,12M14,7.97L15.3,6.67L14,5.37V7.97Z" />
        </svg>
      </button>

      <!-- SCREEN 1: Cinematic Intro Screen -->
      <section class="screen screen-intro active" id="screen-intro">
        <div class="intro-bg-glow"></div>
        <div class="intro-content">
          <div class="intro-badge">
            <span class="pulse-dot"></span> MALAYSIA FOOD JUDGE
          </div>
          <h1 class="intro-title">
            <span class="title-line title-gold">美食判官</span>
            <span class="title-line title-white">THE JUDGE</span>
          </h1>
          <p class="intro-tagline">Step into the critic's shoes. Deliver your ultimate verdict on Malaysia's culinary creations with cinematic impact.</p>
          <button class="btn-primary" id="btn-start" aria-label="Start Judging">
            <span>ENTER STAGE</span>
            <div class="btn-glow"></div>
          </button>
        </div>
      </section>

      <!-- SCREEN 2: Decision Stage Screen -->
      <section class="screen screen-judge" id="screen-judge">
        <!-- Header -->
        <header class="judge-header">
          <div class="header-case">CASE #883</div>
          <div class="header-status pulse-alpha" id="status-text">AWAITING VERDICT...</div>
        </header>

        <!-- Main Arena with Dual Paddles -->
        <div class="paddles-arena" id="paddles-arena">
          <!-- CORRECT / YES PADDLE -->
          <div class="paddle-wrapper" id="wrap-correct">
            <button class="paddle paddle-correct" id="paddle-correct" aria-label="Correct Sign (Pass)">
              <div class="paddle-head">
                <div class="paddle-inner-glow"></div>
                <div class="paddle-content">
                  <svg class="icon-check" viewBox="0 0 24 24" width="70" height="70">
                    <path fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" d="M20 6L9 17l-5-5"/>
                  </svg>
                  <span class="paddle-label">PASS</span>
                </div>
              </div>
              <div class="paddle-handle">
                <div class="handle-ring"></div>
                <div class="handle-ring"></div>
              </div>
            </button>
          </div>

          <!-- WRONG / NO PADDLE -->
          <div class="paddle-wrapper" id="wrap-wrong">
            <button class="paddle paddle-wrong" id="paddle-wrong" aria-label="Wrong Sign (Fail)">
              <div class="paddle-head">
                <div class="paddle-inner-glow"></div>
                <div class="paddle-content">
                  <svg class="icon-cross" viewBox="0 0 24 24" width="70" height="70">
                    <path fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" d="M18 6L6 18M6 6l12 12"/>
                  </svg>
                  <span class="paddle-label">FAIL</span>
                </div>
              </div>
              <div class="paddle-handle">
                <div class="handle-ring"></div>
                <div class="handle-ring"></div>
              </div>
            </button>
          </div>
        </div>

        <!-- Overlays for Verdict Display -->
        <div class="verdict-overlay" id="verdict-overlay">
          <div class="verdict-glow"></div>
          <div class="verdict-message">
            <div class="verdict-badge" id="v-badge">VERDICT RENDERED</div>
            <h2 class="verdict-title" id="v-title">DELICIOUS</h2>
            <p class="verdict-desc" id="v-desc">This dish is certified delicious and authentic.</p>
            <button class="btn-secondary" id="btn-reset" aria-label="Judge Again">
              <span>JUDGE AGAIN</span>
              <div class="btn-glow-soft"></div>
            </button>
          </div>
        </div>

        <!-- Instructions bottom helper -->
        <footer class="judge-footer" id="judge-instructions">
          Tap a paddle to cast judgment
        </footer>
      </section>

    </main>
  </div>

  <!-- GSAP from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <!-- Custom Logic -->
  <script src="script.js"></script>
</body>
</html>
